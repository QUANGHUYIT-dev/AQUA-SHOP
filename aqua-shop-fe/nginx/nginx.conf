events {
    worker_connections 1024;
}

http {
    # 🌟 BẮT BUỘC: Thêm dòng này để fix lỗi vỡ giao diện CSS/JS trên trình duyệt
    include       mime.types;
    default_type  application/octet-stream;

    # 🌟 THÊM: Cấu hình log đẩy thẳng ra Terminal của Docker để dễ debug
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # 1. Cơ chế Map động để tự động bắt tay cho cả HTTP thường và WebSocket
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream frontend {
        server frontend-apps:3000;
    }

    upstream backend {
        server backend-api:8080;
    }

    server {
        listen 80;
        server_name localhost;

        # Điều hướng API sang Backend
        location /api/ {
            rewrite ^/api/(?!v1/)(.*)$ /api/v1/$1 break; 

            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            add_header X-Proxy-Service "backend" always;
            add_header X-Proxy-Target $upstream_addr always;
        }

        # Điều hướng riêng cho Next.js Hot Module Replacement (HMR) WebSocket
        location /_next/webpack-hmr {
            proxy_pass http://frontend;
            
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade"; 

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # QUAN TRỌNG: Tắt buffering để fix lỗi Invalid status line của HMR
            proxy_buffering off;

            # Tránh timeout kết nối WebSocket giữa chừng khi dev
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }
        
        # Điều hướng giao diện sang Frontend (Next.js)
        location / {
            proxy_pass http://frontend;
            
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade; 

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            add_header X-Proxy-Service "frontend" always;
            add_header X-Proxy-Target $upstream_addr always;
        }
    }
}