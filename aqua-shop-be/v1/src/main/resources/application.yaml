server:
  port: ${SERVER_PORT:8080}
  address: ${SERVER_ADDRESS:0.0.0.0}
  servlet:
    context-path: ${CONTEXT_PATH:/api/v1}
  error:
    include-stacktrace: never
    include-binding-errors: always
    include-message: always
spring:
  application:
    name: ${SPRING_APP_NAME:v1}
  config:
    import: optional:classpath:application-local.yaml

  jackson:
    time-zone: ${APP_TIMEZONE:Asia/Ho_Chi_Minh}

  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3307}/${MYSQL_DB:aqua_shop_db_v1}?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&serverTimezone=${APP_TIMEZONE:Asia/Ho_Chi_Minh}&useSSL=false&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:21042004}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:20}
      minimum-idle: ${HIKARI_MIN_IDLE:5}
      connection-timeout: ${HIKARI_CONNECTION_TIMEOUT:30000}
      idle-timeout: ${HIKARI_IDLE_TIMEOUT:600000}
      max-lifetime: ${HIKARI_MAX_LIFETIME:1800000}
      leak-detection-threshold: ${HIKARI_LEAK_DETECTION:60000}

  jpa:
    hibernate:
      ddl-auto: ${JPA_HIBERNATE_DDL_AUTO:update} # none, validate, update, create, create-drop
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        jdbc:
          time_zone: ${APP_TIMEZONE:Asia/Ho_Chi_Minh}
        format_sql: ${JPA_FORMAT_SQL:false}
        use_sql_comments: ${JPA_USE_SQL_COMMENTS:false}
        generate_statistics: ${JPA_GENERATE_STATISTICS:false}
        query:
          plan_cache_max_size: 2048
          plan_parameter_metadata_max_size: 128

  web:
    resources:
      static-locations: file:${app.path.upload.handover}/
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080,http://cnxvn.ddns.net:8080,http://cnxvn.ddns.net:3000}
      allowed-methods: GET,POST,PUT,DELETE,PATCH,OPTIONS
      allowed-headers: "*"
      allow-credentials: true
      max-age: 3600

  servlet:
    multipart:
      max-file-size: ${CLOUDINARY_MAX_FILE_SIZE:10MB}
      max-request-size: ${CLOUDINARY_MAX_REQUEST_SIZE:50MB}
jwt:
  signerKey: ${JWT_SIGNER_KEY:ChonMotChuoiThatDaiVaBiMatChoAquaShop2026!!!!}
  access-token-expiry: ${JWT_ACCESS_TOKEN_EXPIRY:3600} # 1 giờ (tính bằng giây)
  refresh-token-expiry: ${JWT_REFRESH_TOKEN_EXPIRY:86400} # 1 ngày (hoặc 2592000 cho 30 ngày tùy bạn)
  issuer: ${JWT_ISSUER:QuangHuy_dev_it}

app:
  admin:
    # Production: set APP_ADMIN_ENABLED=true + APP_ADMIN_EMAIL + APP_ADMIN_PASSWORD qua env/secret.
    # Local dev: dùng profile `local` → application-local.yaml (copy từ application-local.yaml.example).
    enabled: ${APP_ADMIN_ENABLED:false}
    email: ${APP_ADMIN_EMAIL:}
    password: ${APP_ADMIN_PASSWORD:}
    full-name: ${APP_ADMIN_FULL_NAME:Quản trị viên}
    phone-number: ${APP_ADMIN_PHONE:}
  security:
    enable-verbose-logging: ${APP_SECURITY_ENABLE_VERBOSE_LOGGING:true}

springdoc:
  swagger-ui:
    path: /swagger
  api-docs:
    path: /api-docs

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:dkjidtntp}
  api-key: ${CLOUDINARY_API_KEY:776263785854126}
  api-secret: ${CLOUDINARY_API_SECRET:-PpAaKfr2k4jp9ikWX9AU6pnmdE}
  base-folder: ${CLOUDINARY_BASE_FOLDER:aqua-shop}
  max-file-size-mb: ${CLOUDINARY_MAX_FILE_SIZE_MB:10}
